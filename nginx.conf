# ─────────────────────────────────────────────────────────────────────────────
#  Nginx config for HireFlow SPA
#  • gzip compression
#  • Correct MIME types
#  • SPA fallback (all routes → index.html)
#  • Long-lived cache for hashed assets, no-cache for index.html
#  • Security headers (CSP, HSTS, X-Frame-Options, etc.)
#  • /health endpoint for Docker HEALTHCHECK and load balancer probes
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: blob:; \
         connect-src 'self' https://api.anthropic.com https://api-inference.huggingface.co; \
         frame-ancestors 'none';"        always;

    # ── Hashed assets — cache 1 year ─────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── index.html — never cache ──────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── SPA fallback — all unknown paths → index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hide nginx version ────────────────────────────────────────────────────
    server_tokens off;
}
