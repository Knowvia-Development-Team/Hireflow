# ─────────────────────────────────────────────────────────────────────────────
#  HireFlow CI Pipeline
#  Runs on every push and pull request to main / develop.
#
#  Jobs (all run in parallel unless noted):
#   1. lint          — ESLint + Prettier
#   2. typecheck     — tsc --noEmit (frontend)
#   3. test          — Vitest + coverage ≥ 75%
#   4. build         — Production Vite build + bundle-size gate
#   5. backend-check — tsc --noEmit (server)
#   6. lighthouse    — Performance + a11y budgets  [needs: build]
#   7. e2e           — Playwright (chromium only in CI)  [needs: build]
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  VITE_API_URL:     'http://localhost:3001'
  VITE_ENV:         'development'
  VITE_APP_VERSION: ${{ github.sha }}
  VITE_HF_ENABLED:  'true'

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: ESLint (zero warnings)
        run: npm run lint
      - name: Prettier format check
        run: npm run format:check

  # ── 2. TypeScript ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run typecheck

  # ── 3. Unit + Integration Tests ───────────────────────────────────────────────
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Run Vitest with coverage
        run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      - name: Upload coverage report artefact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── 4. Production Build + Bundle Size Gate ────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle size gate (main chunk < 400 KB gzip)
        run: |
          MAIN=$(find dist/assets -name "index-*.js" | head -1)
          SIZE=$(gzip -c "$MAIN" | wc -c)
          echo "Main chunk gzip size: ${SIZE} bytes"
          [ "$SIZE" -lt 409600 ] || (echo "❌ Main bundle too large (>400 KB gzipped)" && exit 1)
      - name: Print all chunk sizes
        run: |
          echo "=== Chunk sizes (gzip) ==="
          for f in dist/assets/*.js dist/assets/*.css; do
            SIZE=$(gzip -c "$f" | wc -c)
            printf "  %6d bytes  %s\n" "$SIZE" "$(basename $f)"
          done
      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 5. Backend TypeScript ────────────────────────────────────────────────────
  backend-check:
    name: Backend TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  # ── 6. Lighthouse CI ─────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse (Performance + A11y)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13
      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── 7. Playwright E2E ─────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Download dist artefact
        uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - name: Install Playwright browsers (chromium only in CI)
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
