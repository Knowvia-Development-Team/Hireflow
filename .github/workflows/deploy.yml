# ─────────────────────────────────────────────────────────────────────────────
#  HireFlow Deploy Pipeline
#  Triggers on push to main (after CI passes).
#  Deploys to staging first, then waits for manual approval for production.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }

      - run: npm ci

      - name: Build for staging
        run: npm run build
        env:
          VITE_API_URL:     ${{ secrets.STAGING_API_URL }}
          VITE_SENTRY_DSN:  ${{ secrets.SENTRY_DSN }}
          VITE_ENV:         staging
          VITE_APP_VERSION: ${{ github.sha }}

      # Replace with your actual deployment step (Vercel / Cloudflare / S3 + CF)
      - name: Deploy to CDN
        run: echo "Deploy dist/ to staging CDN"

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_API_URL:     ${{ secrets.PROD_API_URL }}
          VITE_SENTRY_DSN:  ${{ secrets.SENTRY_DSN }}
          VITE_ENV:         production
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy to CDN
        run: echo "Deploy dist/ to production CDN"

      - name: Notify Sentry of release
        run: |
          echo "sentry-cli releases new ${{ github.sha }}"
          echo "sentry-cli releases finalize ${{ github.sha }}"
