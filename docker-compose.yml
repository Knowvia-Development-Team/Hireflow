# ─────────────────────────────────────────────────────────────────────────────
#  HireFlow — Full-stack local development with Docker Compose
#
#  Usage:
#    docker compose up          # start everything
#    docker compose up --build  # rebuild images first
#    docker compose down -v     # stop and remove volumes
#
#  Services:
#    frontend  — Vite dev server  (http://localhost:5173)
#    backend   — Express API      (http://localhost:3001)
#    nginx     — Reverse proxy    (http://localhost:8080)  [optional]
# ─────────────────────────────────────────────────────────────────────────────

name: hireflow

services:
  # ---- Postgres (local dev database) ----
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=hireflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - hireflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hireflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hireflow

  # ── Frontend (Vite HMR dev server) ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./src:/app/src:ro          # hot-reload source
      - ./index.html:/app/index.html:ro
      - ./public:/app/public:ro
      - /app/node_modules           # keep container node_modules isolated
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_HF_ENABLED=true
      - VITE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hireflow

  # ── Backend (Express API + Hugging Face) ────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HF_TOKEN=${HF_TOKEN:?Set HF_TOKEN in .env or environment}
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hireflow

  # ── Nginx reverse proxy (mimics production routing) ─────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hireflow
    profiles:
      - proxy   # only starts with: docker compose --profile proxy up

networks:
  hireflow:
    driver: bridge

volumes:
  hireflow_db:
